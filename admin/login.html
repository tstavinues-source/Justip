<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Justip</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body style="background-color: var(--bg-alabaster); display: flex; align-items: center; justify-content: center; height: 100vh;">

    <div class="login-box">
        <h2 style="text-align: center; margin-bottom: 5px;">Akses Dasbor</h2>
        <p style="text-align: center; font-size: 14px; opacity: 0.7; margin-bottom: 25px;">Masukkan kredensial admin Anda.</p>
        
        <form id="login-form">
            <div class="input-grup">
                <label for="email">Email Admin</label>
                <input type="email" id="email" required placeholder="admin@email.com">
            </div>
            
            <div class="input-grup">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Masuk ke Dasbor</button>
        </form>
        <div style="text-align: center; margin-top: 15px;">
            <a href="../index.html" style="font-size: 12px; color: var(--primary-navy); text-decoration: none;">&larr; Kembali ke Katalog</a>
        </div>
    </div>

    <script type="module" src="js/auth.js"></script>

</body>
</html>
